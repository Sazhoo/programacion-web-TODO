<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parqueadero</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="contenedor">

        <h1>Sistema de Parqueadero</h1>

        <form id="formulario">

            <label>Tipo de Vehículo</label>
            <select id="tipoVehiculo">
                <option value="Automovil">Automóvil</option>
                <option value="Moto">Moto</option>
            </select>

            <label>Placa</label>
            <input type="text" id="placa" placeholder="ABC123">

            <label>Fecha y Hora de Ingreso</label>
            <input type="datetime-local" id="ingreso">

            <label>Fecha y Hora de Salida</label>
            <input type="datetime-local" id="salida">

            <label>¿Tiene Pico y Placa?</label>
            <select id="picoPlaca">
                <option value="No">No</option>
                <option value="Si">Sí</option>
            </select>

            <label>Dinero Entregado</label>
            <input type="number" id="pago">

            <button type="submit">
                Calcular Pago
            </button>

        </form>

        <div id="resultado"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
